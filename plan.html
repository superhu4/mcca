
<style>
.bp-wrap { font-family: var(--font-sans); font-size: 15px; color: var(--color-text-primary); padding: 1rem 0; }
.bp-week-radios { display: none; }
.bp-day-checks { display: none; }
.bp-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.bp-tab { padding: 5px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: 99px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); }
#w1:checked ~ .bp-tabs label[for=w1],
#w2:checked ~ .bp-tabs label[for=w2],
#w3:checked ~ .bp-tabs label[for=w3],
#w4:checked ~ .bp-tabs label[for=w4] { border-color: var(--color-text-primary); color: var(--color-text-primary); }
.bp-weeks { }
.bp-week { display: none; }
#w1:checked ~ .bp-weeks .bp-week-1,
#w2:checked ~ .bp-weeks .bp-week-2,
#w3:checked ~ .bp-weeks .bp-week-3,
#w4:checked ~ .bp-weeks .bp-week-4 { display: block; }
.bp-week-heading { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
.bp-day { display: flex; align-items: flex-start; gap: 10px; padding: 0.75rem 1rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; cursor: pointer; }
.bp-day:hover { border-color: var(--color-border-secondary); }
.bp-circle { width: 18px; height: 18px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); flex-shrink: 0; margin-top: 2px; }
.bp-day-text { }
.bp-passage { font-size: 15px; line-height: 1.3; }
.bp-desc { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

#d1:checked ~ .bp-weeks .bp-week-1 label[for=d1] .bp-circle,
#d2:checked ~ .bp-weeks .bp-week-1 label[for=d2] .bp-circle,
#d3:checked ~ .bp-weeks .bp-week-1 label[for=d3] .bp-circle,
#d4:checked ~ .bp-weeks .bp-week-1 label[for=d4] .bp-circle,
#d5:checked ~ .bp-weeks .bp-week-1 label[for=d5] .bp-circle,
#d6:checked ~ .bp-weeks .bp-week-1 label[for=d6] .bp-circle,
#d7:checked ~ .bp-weeks .bp-week-1 label[for=d7] .bp-circle,
#d8:checked ~ .bp-weeks .bp-week-2 label[for=d8] .bp-circle,
#d9:checked ~ .bp-weeks .bp-week-2 label[for=d9] .bp-circle,

#d12:checked ~ .bp-weeks .bp-week-2 label[for=d12] .bp-circle,
#d13:checked ~ .bp-weeks .bp-week-2 label[for=d13] .bp-circle,
#d14:checked ~ .bp-weeks .bp-week-2 label[for=d14] .bp-circle,
#d15:checked ~ .bp-weeks .bp-week-3 label[for=d15] .bp-circle,
#d16:checked ~ .bp-weeks .bp-week-3 label[for=d16] .bp-circle,
#d17:checked ~ .bp-weeks .bp-week-3 label[for=d17] .bp-circle,
#d18:checked ~ .bp-weeks .bp-week-3 label[for=d18] .bp-circle,
#d19:checked ~ .bp-weeks .bp-week-3 label[for=d19] .bp-circle,
#d20:checked ~ .bp-weeks .bp-week-3 label[for=d20] .bp-circle,
#d21:checked ~ .bp-weeks .bp-week-3 label[for=d21] .bp-circle,
#d22:checked ~ .bp-weeks .bp-week-4 label[for=d22] .bp-circle,
#d23:checked ~ .bp-weeks .bp-week-4 label[for=d23] .bp-circle,
#d24:checked ~ .bp-weeks .bp-week-4 label[for=d24] .bp-circle,
#d25:checked ~ .bp-weeks .bp-week-4 label[for=d25] .bp-circle,
#d26:checked ~ .bp-weeks .bp-week-4 label[for=d26] .bp-circle,
#d27:checked ~ .bp-weeks .bp-week-4 label[for=d27] .bp-circle,
#d28:checked ~ .bp-weeks .bp-week-4 label[for=d28] .bp-circle { background: var(--color-text-primary); border-color: var(--color-text-primary); }

#d1:checked ~ .bp-weeks .bp-week-1 label[for=d1] .bp-passage,
#d2:checked ~ .bp-weeks .bp-week-1 label[for=d2] .bp-passage,
#d3:checked ~ .bp-weeks .bp-week-1 label[for=d3] .bp-passage,

#d11:checked ~ .bp-weeks .bp-week-2 label[for=d11] .bp-passage,
#d12:checked ~ .bp-weeks .bp-week-2 label[for=d12] .bp-passage,
#d13:checked ~ .bp-weeks .bp-week-2 label[for=d13] .bp-passage,
#d14:checked ~ .bp-weeks .bp-week-2 label[for=d14] .bp-passage,
#d15:checked ~ .bp-weeks .bp-week-3 label[for=d15] .bp-passage,
#d16:checked ~ .bp-weeks .bp-week-3 label[for=d16] .bp-passage,
#d17:checked ~ .bp-weeks .bp-week-3 label[for=d17] .bp-passage,
#d18:checked ~ .bp-weeks .bp-week-3 label[for=d18] .bp-passage,
#d19:checked ~ .bp-weeks .bp-week-3 label[for=d19] .bp-passage,
#d20:checked ~ .bp-weeks .bp-week-3 label[for=d20] .bp-passage,

#d28:checked ~ .bp-weeks .bp-week-4 label[for=d28] .bp-passage { color: var(--color-text-secondary); text-decoration: line-through; }

.bp-complete { display: none; font-size: 13px; color: var(--color-text-secondary); margin-top: 0.75rem; }
.bp-week-1:has(label[for=d1] input):has(#d1:checked) { color: red; }

.bp-week-1:has(label[for=d1]):has(label[for=d2]):has(label[for=d3]):has(label[for=d4]):has(label[for=d5]):has(label[for=d6]):has(label[for=d7]) .bp-complete { display: none; }

#d1:checked ~ #d2:checked { color: red; }
</style>

<div class="bp-wrap">
  <h2 class="sr-only">CSS-only Bible reading plan with four tabbed weeks and checkable daily readings</h2>

  <input class="bp-week-radios" type="radio" name="week" id="w1" checked>
  <input class="bp-week-radios" type="radio" name="week" id="w2">
  <input class="bp-week-radios" type="radio" name="week" id="w3">
  <input class="bp-week-radios" type="radio" name="week" id="w4">

  <input class="bp-day-checks" type="checkbox" id="d1">
  <input class="bp-day-checks" type="checkbox" id="d2">
  <input class="bp-day-checks" type="checkbox" id="d3">
  <input class="bp-day-checks" type="checkbox" id="d4">
  <input class="bp-day-checks" type="checkbox" id="d5">
  <input class="bp-day-checks" type="checkbox" id="d6">
  <input class="bp-day-checks" type="checkbox" id="d7">
  <input class="bp-day-checks" type="checkbox" id="d8">
  <input class="bp-day-checks" type="checkbox" id="d9">
  <input class="bp-day-checks" type="checkbox" id="d10">
  <input class="bp-day-checks" type="checkbox" id="d11">
  <input class="bp-day-checks" type="checkbox" id="d12">
  <input class="bp-day-checks" type="checkbox" id="d13">
  <input class="bp-day-checks" type="checkbox" id="d14">
  <input class="bp-day-checks" type="checkbox" id="d15">
  <input class="bp-day-checks" type="checkbox" id="d16">
  <input class="bp-day-checks" type="checkbox" id="d17">
  <input class="bp-day-checks" type="checkbox" id="d18">
  <input class="bp-day-checks" type="checkbox" id="d19">
  <input class="bp-day-checks" type="checkbox" id="d20">
  <input class="bp-day-checks" type="checkbox" id="d21">
  <input class="bp-day-checks" type="checkbox" id="d22">
  <input class="bp-day-checks" type="checkbox" id="d23">
  <input class="bp-day-checks" type="checkbox" id="d24">
  <input class="bp-day-checks" type="checkbox" id="d25">
  <input class="bp-day-checks" type="checkbox" id="d26">
  <input class="bp-day-checks" type="checkbox" id="d27">
  <input class="bp-day-checks" type="checkbox" id="d28">

  <div class="bp-tabs">
    <label class="bp-tab" for="w1">Week 1</label>
    <label class="bp-tab" for="w2">Week 2</label>
    <label class="bp-tab" for="w3">Week 3</label>
    <label class="bp-tab" for="w4">Week 4</label>
  </div>

  <div class="bp-weeks">

    <div class="bp-week bp-week-1">
      <p class="bp-week-heading">In the Beginning</p>
      <label class="bp-day" for="d1"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Genesis 1–2</span><span class="bp-desc">Creation of the heavens and earth</span></span></label>
      <label class="bp-day" for="d2"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Genesis 3–4</span><span class="bp-desc">The Fall and its consequences</span></span></label>
      <label class="bp-day" for="d3"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Genesis 6–9</span><span class="bp-desc">Noah and the great flood</span></span></label>
      <label class="bp-day" for="d4"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Psalm 1 & 19</span><span class="bp-desc">The blessed life; God's glory in creation</span></span></label>
      <label class="bp-day" for="d5"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">John 1:1–18</span><span class="bp-desc">The Word made flesh</span></span></label>
      <label class="bp-day" for="d6"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Romans 8</span><span class="bp-desc">Life in the Spirit</span></span></label>
      <label class="bp-day" for="d7"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Psalm 23 & 24</span><span class="bp-desc">The Lord is my shepherd</span></span></label>
    </div>

    <div class="bp-week bp-week-2">
      <p class="bp-week-heading">Covenant & Law</p>
      <label class="bp-day" for="d8"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Exodus 19–20</span><span class="bp-desc">Mount Sinai; the Ten Commandments</span></span></label>
      <label class="bp-day" for="d9"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Exodus 32–34</span><span class="bp-desc">The golden calf and covenant renewed</span></span></label>
      <label class="bp-day" for="d10"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Deuteronomy 6–8</span><span class="bp-desc">Love the Lord with all your heart</span></span></label>
      <label class="bp-day" for="d11"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Joshua 1–2</span><span class="bp-desc">Be strong and courageous</span></span></label>
      <label class="bp-day" for="d12"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Psalm 119:1–80</span><span class="bp-desc">The greatness of God's Word</span></span></label>
      <label class="bp-day" for="d13"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Matthew 5–7</span><span class="bp-desc">The Sermon on the Mount</span></span></label>
      <label class="bp-day" for="d14"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Galatians 3–4</span><span class="bp-desc">Faith and the law</span></span></label>
    </div>

    <div class="bp-week bp-week-3">
      <p class="bp-week-heading">Kings & Prophets</p>
      <label class="bp-day" for="d15"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">1 Samuel 16–17</span><span class="bp-desc">David anointed; David and Goliath</span></span></label>
      <label class="bp-day" for="d16"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">2 Samuel 7</span><span class="bp-desc">God's covenant with David</span></span></label>
      <label class="bp-day" for="d17"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">1 Kings 18–19</span><span class="bp-desc">Elijah on Mount Carmel</span></span></label>
      <label class="bp-day" for="d18"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Isaiah 40 & 53</span><span class="bp-desc">Comfort my people; the suffering servant</span></span></label>
      <label class="bp-day" for="d19"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Jeremiah 31</span><span class="bp-desc">The new covenant promised</span></span></label>
      <label class="bp-day" for="d20"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Daniel 6</span><span class="bp-desc">Daniel in the lions' den</span></span></label>
      <label class="bp-day" for="d21"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Psalm 46 & 91</span><span class="bp-desc">God is our refuge and strength</span></span></label>
    </div>

    <div class="bp-week bp-week-4">
      <p class="bp-week-heading">Gospel & New Creation</p>
      <label class="bp-day" for="d22"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Luke 1–2</span><span class="bp-desc">The birth of Jesus</span></span></label>
      <label class="bp-day" for="d23"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Luke 15</span><span class="bp-desc">The lost sheep, coin, and son</span></span></label>
      <label class="bp-day" for="d24"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">John 11</span><span class="bp-desc">The resurrection of Lazarus</span></span></label>
      <label class="bp-day" for="d25"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">John 17–19</span><span class="bp-desc">Jesus' prayer; the crucifixion</span></span></label>
      <label class="bp-day" for="d26"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">John 20–21</span><span class="bp-desc">The resurrection appearances</span></span></label>
      <label class="bp-day" for="d27"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Acts 2</span><span class="bp-desc">The day of Pentecost</span></span></label>
      <label class="bp-day" for="d28"><span class="bp-circle"></span><span class="bp-day-text"><span class="bp-passage">Revelation 21–22</span><span class="bp-desc">The new heaven and the new earth</span></span></label>
    </div>

  </div>
</div>
